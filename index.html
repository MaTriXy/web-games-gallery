<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Matrixy Web Games</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4efe5;
      --ink: #172033;
      --muted: #5a6685;
      --card: rgba(255,255,255,0.9);
      --line: rgba(23,32,51,0.1);
      --accent: #ff6b2c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #fff8ee 0%, var(--bg) 55%, #f6f6fb 100%);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    main {
      width: min(760px, 100%);
      padding: 32px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--card);
      text-align: center;
      box-shadow: 0 18px 40px rgba(23,32,51,0.12);
    }
    h1 {
      margin: 0 0 12px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2.5rem, 6vw, 4rem);
      line-height: 0.95;
      letter-spacing: -0.03em;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 1.05rem;
    }
    .pill {
      display: inline-block;
      margin-bottom: 16px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 12px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <div class="pill">Gallery Reset</div>
    <h1>No published games right now.</h1>
    <p>The gallery was cleared and is waiting for a better set of games.</p>
  </main>
</body>
</html>
