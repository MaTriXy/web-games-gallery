<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Matrixy Web Games</title>
  <style>
    :root {
      --bg: #f3efe7;
      --ink: #152033;
      --muted: #5b657a;
      --card: #fffdf9;
      --line: rgba(21, 32, 51, 0.12);
      --accent: #d65a1f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(214, 90, 31, 0.16), transparent 28%),
        linear-gradient(180deg, #fff8ef 0%, var(--bg) 100%);
    }
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 20px 64px;
    }
    section {
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--card);
      box-shadow: 0 18px 42px rgba(21, 32, 51, 0.08);
    }
    p.kicker {
      margin: 0 0 10px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 12px;
      font-weight: 700;
    }
    h1 {
      margin: 0 0 12px;
      font: 700 clamp(2.2rem, 5vw, 4rem) / 0.95 Georgia, serif;
      letter-spacing: -0.03em;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      max-width: 60ch;
    }
    .meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }
    .meta span {
      padding: 7px 11px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main>
    <section>
      <p class="kicker">Gallery Reset</p>
      <h1>No published games right now.</h1>
      <p>
        The previous generated games were removed. This gallery will stay empty until a new run produces games worth publishing.
      </p>
      <div class="meta">
        <span>0 weeks</span>
        <span>0 games</span>
        <span>Waiting for next publish</span>
      </div>
    </section>
  </main>
</body>
</html>
